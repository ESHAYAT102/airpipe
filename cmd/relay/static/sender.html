<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AirPipe - Upload</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{max-width:420px;width:100%;text-align:center}
.logo{font-size:1.75rem;font-weight:700;margin-bottom:2rem;letter-spacing:-0.5px}
.logo span{color:#00d4ff}
.card{background:#111;border-radius:16px;padding:2rem;border:1px solid #1e1e1e;box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 8px 40px rgba(0,0,0,0.4)}
.status{font-size:0.95rem;margin-bottom:0.5rem;color:#888;font-weight:500}
.status-detail{font-size:0.8rem;color:#555;margin-bottom:1.25rem}

.upload-zone{
  border:2px dashed #2a2a2a;border-radius:14px;padding:2.5rem 1.5rem;cursor:pointer;
  margin-bottom:1rem;transition:all 0.2s ease;
  display:flex;flex-direction:column;align-items:center;gap:0.75rem;
  min-height:160px;justify-content:center;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:#00d4ff;background:rgba(0,212,255,0.04);
}
.upload-zone.dragover{transform:scale(1.01)}
.upload-icon{font-size:2rem;opacity:0.6;transition:opacity 0.2s}
.upload-zone:hover .upload-icon,.upload-zone.dragover .upload-icon{opacity:1}
.upload-label{font-size:0.9rem;color:#666;font-weight:500}
.upload-label strong{color:#00d4ff}
.upload-hint{font-size:0.7rem;color:#444}

.filename{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:0.85rem;background:#0a0a0a;padding:0.75rem 1rem;border-radius:10px;margin-bottom:1rem;color:#e0e0e0;border:1px solid #1e1e1e;word-break:break-all}
.progress-wrap{margin-bottom:1rem}
.progress-bar{background:#1a1a1a;border-radius:6px;height:4px;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,#00d4ff,#7b61ff);width:0%;transition:width 0.15s ease;border-radius:6px}
.progress-text{font-size:0.75rem;color:#555;font-variant-numeric:tabular-nums}
.speed-info{font-size:0.75rem;color:#444;margin-top:0.25rem;font-variant-numeric:tabular-nums}
.size-info{font-size:0.8rem;color:#555;margin-bottom:1rem;font-variant-numeric:tabular-nums}
.file-icon{font-size:2.5rem;margin-bottom:1rem;line-height:1}
.hidden{display:none}
.success{color:#34d399}
.error-text{color:#f87171}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,255,0.06);color:#00d4ff;padding:0.4rem 0.85rem;border-radius:20px;font-size:0.7rem;margin-top:1.5rem;font-weight:500;letter-spacing:0.2px}
.badge svg{width:12px;height:12px;fill:currentColor}
.footer{margin-top:2.5rem;font-size:0.7rem;color:#333}
.footer a{color:#444;text-decoration:none;transition:color 0.2s}
.footer a:hover{color:#00d4ff}
input[type=file]{display:none}

@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.loading-dots{display:flex;gap:4px;justify-content:center;margin:1rem auto 0.75rem}
.loading-dots span{width:6px;height:6px;background:#00d4ff;border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:0.2s}
.loading-dots span:nth-child(3){animation-delay:0.4s}
</style>
</head>
<body>
<div class="container">
<div class="logo">Air<span>Pipe</span></div>
<div class="card">

<div id="connecting">
<div class="loading-dots"><span></span><span></span><span></span></div>
<div class="status">Connecting...</div>
<div class="status-detail">Establishing encrypted channel</div>
</div>

<div id="select" class="hidden">
<div class="status">Ready to send</div>
<div class="status-detail">File will be encrypted before transfer</div>
<div class="upload-zone" id="dropzone">
<div class="upload-icon">📂</div>
<div class="upload-label">Tap to select or <strong>drop a file</strong></div>
<div class="upload-hint">Any file type, any size</div>
</div>
<input type="file" id="fileinput">
</div>

<div id="sending" class="hidden">
<div class="status">Uploading</div>
<div class="filename" id="filename">-</div>
<div class="size-info" id="send-size"></div>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="progress-text" id="ptext">0%</div>
</div>
<div class="speed-info" id="speed"></div>
</div>

<div id="complete" class="hidden">
<div class="file-icon">✅</div>
<div class="status success">Transfer complete</div>
<div class="filename" id="done-name">-</div>
<div class="size-info" id="done-size"></div>
</div>

<div id="error" class="hidden">
<div class="file-icon">⚠️</div>
<div class="status error-text">Transfer failed</div>
<div class="filename" id="errmsg">-</div>
</div>

<div class="badge">
<svg viewBox="0 0 16 16"><path d="M8 1a4 4 0 0 0-4 4v3H3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-1V5a4 4 0 0 0-4-4zm2 7H6V5a2 2 0 1 1 4 0v3z"/></svg>
End-to-end encrypted
</div>
</div>
</div>

<div class="footer">powered by <a href="https://github.com/Sanyam-G/Airpipe" target="_blank">AirPipe</a></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
<script>
const CHUNK=64*1024;
const token=location.pathname.split('/').pop();
const keyHash=location.hash.slice(1);
if(!token||!keyHash){showError('Invalid link');throw''}

let keyBytes;
try{
  keyBytes=b64decode(keyHash);
  if(keyBytes.length!==32)throw'';
}catch(e){showError('Invalid encryption key');throw e}

function formatSize(bytes){
  if(bytes===0)return '0 B';
  const units=['B','KB','MB','GB'];
  const i=Math.floor(Math.log(bytes)/Math.log(1024));
  return (bytes/Math.pow(1024,i)).toFixed(i===0?0:1)+' '+units[i];
}

function formatSpeed(bytesPerSec){
  if(bytesPerSec<1024)return bytesPerSec.toFixed(0)+' B/s';
  if(bytesPerSec<1048576)return (bytesPerSec/1024).toFixed(1)+' KB/s';
  return (bytesPerSec/1048576).toFixed(1)+' MB/s';
}

// WebSocket setup
const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws/'+token);
ws.binaryType='arraybuffer';
ws.onopen=()=>{show('select')};
ws.onerror=()=>{showError('Connection lost. Reload to retry.')};
ws.onclose=()=>{
  const sendingEl=document.getElementById('sending');
  if(!sendingEl.classList.contains('hidden')){
    showError('Connection closed during transfer');
  }
};

// Click to select
const dropzone=document.getElementById('dropzone');
const fileinput=document.getElementById('fileinput');
dropzone.addEventListener('click',()=>fileinput.click());
fileinput.addEventListener('change',(e)=>{if(e.target.files.length)sendFile(e.target.files[0])});

// Drag and drop
dropzone.addEventListener('dragover',(e)=>{e.preventDefault();dropzone.classList.add('dragover')});
dropzone.addEventListener('dragleave',()=>{dropzone.classList.remove('dragover')});
dropzone.addEventListener('drop',(e)=>{
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if(e.dataTransfer.files.length)sendFile(e.dataTransfer.files[0]);
});

async function sendFile(file){
  document.getElementById('filename').textContent=file.name;
  document.getElementById('send-size').textContent=formatSize(file.size);
  show('sending');

  const meta={filename:file.name,size:file.size,chunks:Math.ceil(file.size/CHUNK)};
  ws.send(encrypt(encode(0x01,new TextEncoder().encode(JSON.stringify(meta))),keyBytes));

  let offset=0;
  const startTime=performance.now();
  let lastUIUpdate=0;

  while(offset<file.size){
    const end=Math.min(offset+CHUNK,file.size);
    const chunk=await file.slice(offset,end).arrayBuffer();
    ws.send(encrypt(encode(0x10,new Uint8Array(chunk)),keyBytes));
    offset=end;

    // Use rAF for UI updates instead of setTimeout
    const now=performance.now();
    if(now-lastUIUpdate>50||offset>=file.size){
      lastUIUpdate=now;
      const pct=Math.round(offset/file.size*100);
      const elapsed=(now-startTime)/1000;
      const speed=elapsed>0?offset/elapsed:0;

      await new Promise(resolve=>{
        requestAnimationFrame(()=>{
          document.getElementById('progress').style.width=pct+'%';
          document.getElementById('ptext').textContent=pct+'% \u00b7 '+formatSize(offset)+' / '+formatSize(file.size);
          document.getElementById('speed').textContent=formatSpeed(speed);
          resolve();
        });
      });
    }
  }

  ws.send(encrypt(encode(0x03,new Uint8Array(0)),keyBytes));

  document.getElementById('done-name').textContent=file.name;
  document.getElementById('done-size').textContent=formatSize(file.size);
  show('complete');
}

function show(id){
  ['connecting','select','sending','complete','error'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showError(msg){
  show('error');
  document.getElementById('errmsg').textContent=msg;
}

function encrypt(data,key){
  const nonce=nacl.randomBytes(24);
  const enc=nacl.secretbox(data,nonce,key);
  const r=new Uint8Array(24+enc.length);
  r.set(nonce);
  r.set(enc,24);
  return r;
}

function encode(type,payload){
  const r=new Uint8Array(5+payload.length);
  r[0]=type;
  r[1]=(payload.length>>24)&0xff;
  r[2]=(payload.length>>16)&0xff;
  r[3]=(payload.length>>8)&0xff;
  r[4]=payload.length&0xff;
  r.set(payload,5);
  return r;
}

function b64decode(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  const b=atob(s);
  const r=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);
  return r;
}
</script>
</body>
</html>
