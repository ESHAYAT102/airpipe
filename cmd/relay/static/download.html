<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AirPipe - Download</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{max-width:420px;width:100%;text-align:center}
.logo{font-size:1.75rem;font-weight:700;margin-bottom:2rem;letter-spacing:-0.5px}
.logo span{color:#00d4ff}
.card{background:#111;border-radius:16px;padding:2rem;border:1px solid #1e1e1e;box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 8px 40px rgba(0,0,0,0.4)}
.file-icon{font-size:2.5rem;margin-bottom:1rem;line-height:1}
.status{font-size:0.95rem;margin-bottom:0.5rem;color:#888;font-weight:500}
.status-detail{font-size:0.8rem;color:#555;margin-bottom:1.25rem}
.filename{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:0.85rem;background:#0a0a0a;padding:0.75rem 1rem;border-radius:10px;margin-bottom:1rem;color:#e0e0e0;border:1px solid #1e1e1e;word-break:break-all}
.progress-wrap{margin-bottom:1rem}
.progress-bar{background:#1a1a1a;border-radius:6px;height:4px;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,#00d4ff,#7b61ff);width:0%;transition:width 0.3s ease;border-radius:6px}
.progress-text{font-size:0.75rem;color:#555;font-variant-numeric:tabular-nums}
.hidden{display:none}
.success{color:#34d399}
.error-text{color:#f87171}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,255,0.06);color:#00d4ff;padding:0.4rem 0.85rem;border-radius:20px;font-size:0.7rem;margin-top:1.5rem;font-weight:500;letter-spacing:0.2px}
.badge svg{width:12px;height:12px;fill:currentColor}
.footer{margin-top:2.5rem;font-size:0.7rem;color:#333}
.footer a{color:#444;text-decoration:none;transition:color 0.2s}
.footer a:hover{color:#00d4ff}

@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.loading-dots{display:flex;gap:4px;justify-content:center;margin:1rem auto 0.75rem}
.loading-dots span{width:6px;height:6px;background:#00d4ff;border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:0.2s}
.loading-dots span:nth-child(3){animation-delay:0.4s}

.size-info{font-size:0.8rem;color:#555;margin-bottom:1rem;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="container">
<div class="logo">Air<span>Pipe</span></div>
<div class="card">

<div id="loading">
<div class="loading-dots"><span></span><span></span><span></span></div>
<div class="status" id="load-status">Downloading...</div>
<div class="status-detail" id="load-detail">Fetching encrypted file</div>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="progress-text" id="ptext"></div>
</div>
</div>

<div id="complete" class="hidden">
<div class="file-icon" id="file-icon">📄</div>
<div class="status success">Decrypted and ready</div>
<div class="filename" id="fname">-</div>
<div class="size-info" id="file-size"></div>
</div>

<div id="error" class="hidden">
<div class="file-icon">⚠️</div>
<div class="status error-text">Transfer failed</div>
<div class="filename" id="errmsg">-</div>
</div>

<div class="badge">
<svg viewBox="0 0 16 16"><path d="M8 1a4 4 0 0 0-4 4v3H3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-1V5a4 4 0 0 0-4-4zm2 7H6V5a2 2 0 1 1 4 0v3z"/></svg>
End-to-end encrypted
</div>
</div>
</div>

<div class="footer">powered by <a href="https://github.com/Sanyam-G/Airpipe" target="_blank">AirPipe</a></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
<script>
const token=location.pathname.split('/').pop();
const keyStr=location.hash.slice(1);
if(!token||!keyStr){showError('Invalid link');throw''}

let key;
try{
  key=b64decode(keyStr);
  if(key.length!==32)throw'';
}catch(e){showError('Invalid encryption key');throw e}

const fileIcons={
  zip:'🗂️',gz:'🗂️',tar:'🗂️',rar:'🗂️','7z':'🗂️',
  jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',svg:'🖼️',webp:'🖼️',bmp:'🖼️',
  mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',webm:'🎬',
  mp3:'🎵',wav:'🎵',flac:'🎵',aac:'🎵',ogg:'🎵',
  pdf:'📕',doc:'📄',docx:'📄',txt:'📄',md:'📄',csv:'📄',
  js:'💻',py:'💻',go:'💻',rs:'💻',html:'💻',css:'💻',json:'💻',
};

function getFileIcon(filename){
  const ext=filename.split('.').pop().toLowerCase();
  return fileIcons[ext]||'📦';
}

function formatSize(bytes){
  if(bytes===0)return '0 B';
  const units=['B','KB','MB','GB'];
  const i=Math.floor(Math.log(bytes)/Math.log(1024));
  return (bytes/Math.pow(1024,i)).toFixed(i===0?0:1)+' '+units[i];
}

(async()=>{
  try{
    setStatus('Downloading...','Fetching encrypted file from relay');

    const resp=await fetch('/raw/'+token);
    if(!resp.ok){showError('File not found or expired');return}

    const contentLength=resp.headers.get('content-length');
    const totalSize=contentLength?parseInt(contentLength):null;

    let encrypted;
    if(totalSize && resp.body){
      // Stream download with progress
      const reader=resp.body.getReader();
      const chunks=[];
      let received=0;
      while(true){
        const {done,value}=await reader.read();
        if(done)break;
        chunks.push(value);
        received+=value.length;
        const pct=Math.round(received/totalSize*100);
        document.getElementById('progress').style.width=pct+'%';
        document.getElementById('ptext').textContent=formatSize(received)+' / '+formatSize(totalSize);
      }
      encrypted=new Uint8Array(received);
      let pos=0;
      for(const chunk of chunks){encrypted.set(chunk,pos);pos+=chunk.length}
    }else{
      document.getElementById('progress').style.width='50%';
      encrypted=new Uint8Array(await resp.arrayBuffer());
    }

    if(encrypted.length<24){showError('File too small to contain encrypted data');return}

    // Decryption phase
    setStatus('Decrypting...','Verifying encryption key');
    document.getElementById('progress').style.width='80%';

    const nonce=encrypted.slice(0,24);
    const ciphertext=encrypted.slice(24);

    let decrypted;
    try{
      decrypted=nacl.secretbox.open(ciphertext,nonce,key);
    }catch(e){
      showError('Decryption error: '+( e.message||'corrupted data'));
      return;
    }
    if(!decrypted){showError('Decryption failed. Wrong key or corrupted file.');return}

    document.getElementById('progress').style.width='100%';

    // Parse: [4-byte filename len][filename][content]
    const fnLen=(decrypted[0]<<24)|(decrypted[1]<<16)|(decrypted[2]<<8)|decrypted[3];
    const filename=new TextDecoder().decode(decrypted.slice(4,4+fnLen));
    const content=decrypted.slice(4+fnLen);

    // Show complete state
    document.getElementById('fname').textContent=filename;
    document.getElementById('file-icon').textContent=getFileIcon(filename);
    document.getElementById('file-size').textContent=formatSize(content.length);
    show('complete');

    // Trigger download
    const blob=new Blob([content]);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    a.click();
  }catch(e){
    showError(e.message||'Download failed');
  }
})();

function setStatus(main,detail){
  document.getElementById('load-status').textContent=main;
  document.getElementById('load-detail').textContent=detail||'';
}

function show(id){
  ['loading','complete','error'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showError(msg){
  show('error');
  document.getElementById('errmsg').textContent=msg;
}

function b64decode(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  const b=atob(s);
  const r=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);
  return r;
}
</script>
</body>
</html>
